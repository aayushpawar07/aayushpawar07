<svg xmlns="http://www.w3.org/2000/svg" width="380" height="440" viewBox="0 0 380 440" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#card-grad); stroke-width: 1.5; }
    .title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; fill: #FFFFFF; letter-spacing: 0.5px; }
    .tech { font-family: 'Fira Code', monospace; font-weight: 600; font-size: 11px; fill: #FFA116; letter-spacing: 0.5px; }
    .desc { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px; fill: #8B949E; }
    .glow-orange { filter: url(#glow-o); }
    .glow-indigo { filter: url(#glow-i); }
    .glow-green { filter: url(#glow-g); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-o" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-i" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Outer Gradient -->
    <linearGradient id="card-grad" x1="0" y1="0" x2="380" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFA116" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0.8"/>
    </linearGradient>

    <!-- UI Gradients -->
    <linearGradient id="hotel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E3440" />
      <stop offset="100%" stop-color="#1A1C23" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect x="1" y="1" width="378" height="438" rx="12" class="card-bg" />

  <!-- Header Section -->
  <g transform="translate(190, 45)">
    <text text-anchor="middle" class="title">🏨 Hotel Booking Portal</text>
  </g>

  <!-- ==================== ILLUSTRATION AREA ==================== -->
  <g transform="translate(0, 75)">
    <!-- Hotel Building Silhouette -->
    <rect x="75" y="25" width="90" height="160" rx="8" fill="url(#hotel-grad)" stroke="#434C5E" stroke-width="1.5" />
    <!-- Ground Base line -->
    <line x1="50" y1="185" x2="330" y2="185" stroke="#4C566A" stroke-width="2" stroke-linecap="round" />

    <!-- Hotel Windows (Glowing Cyan and Yellow - Twinkling) -->
    <!-- Row 1 -->
    <rect x="87" y="38" width="12" height="12" rx="2" fill="#EBCB8B" class="glow-orange" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
    </rect>
    <rect x="114" y="38" width="12" height="12" rx="2" fill="#2E3440" />
    <rect x="141" y="38" width="12" height="12" rx="2" fill="#88C0D0" class="glow-indigo" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite" />
    </rect>
    <!-- Row 2 -->
    <rect x="87" y="60" width="12" height="12" rx="2" fill="#88C0D0" class="glow-indigo" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="4s" repeatCount="indefinite" />
    </rect>
    <rect x="114" y="60" width="12" height="12" rx="2" fill="#EBCB8B" class="glow-orange" opacity="0.7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
    </rect>
    <rect x="141" y="60" width="12" height="12" rx="2" fill="#2E3440" />
    <!-- Row 3 -->
    <rect x="87" y="82" width="12" height="12" rx="2" fill="#2E3440" />
    <rect x="114" y="82" width="12" height="12" rx="2" fill="#88C0D0" class="glow-indigo" opacity="0.5">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.5s" repeatCount="indefinite" />
    </rect>
    <rect x="141" y="82" width="12" height="12" rx="2" fill="#EBCB8B" class="glow-orange" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="4.5s" repeatCount="indefinite" />
    </rect>
    <!-- Row 4 -->
    <rect x="87" y="104" width="12" height="12" rx="2" fill="#EBCB8B" class="glow-orange" opacity="0.7" />
    <rect x="114" y="104" width="12" height="12" rx="2" fill="#2E3440" />
    <rect x="141" y="104" width="12" height="12" rx="2" fill="#88C0D0" class="glow-indigo" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite" />
    </rect>
    
    <!-- Hotel Entrance / Lobby Door -->
    <path d="M110,185 L110,150 L130,150 L130,185 Z" fill="#81A1C1" class="glow-indigo" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite" />
    </path>
    <line x1="120" y1="150" x2="120" y2="185" stroke="#2E3440" stroke-width="1" />
    <!-- Modern Roof Overhang -->
    <rect x="65" y="18" width="110" height="7" rx="3" fill="#D8DEE9" />
    <text x="120" y="13" font-family="'Inter', sans-serif" font-weight="900" font-size="9" fill="#EBCB8B" text-anchor="middle" class="glow-orange">LUXE</text>

    <!-- Calendar Panel (Real-Time Availability Scheduler) -->
    <g transform="translate(190, 25)">
      <!-- Calendar Body -->
      <rect width="110" height="96" rx="6" fill="#1E222A" stroke="#3F4452" stroke-width="1.5" />
      <!-- Top banner -->
      <rect width="110" height="20" rx="6" fill="#EBCB8B" fill-opacity="0.15" />
      <rect x="0" y="16" width="110" height="4" fill="#EBCB8B" fill-opacity="0.4" />
      <text x="55" y="13" font-family="'Inter', sans-serif" font-weight="800" font-size="8" fill="#EBCB8B" text-anchor="middle" letter-spacing="1">MAY 2026</text>
      <!-- Mini calendar dots/squares -->
      <!-- Row 1 -->
      <rect x="12" y="30" width="14" height="12" rx="2" fill="#2E3440" />
      <rect x="34" y="30" width="14" height="12" rx="2" fill="#2E3440" />
      <rect x="56" y="30" width="14" height="12" rx="2" fill="#A3BE8C" class="glow-green" />
      <rect x="78" y="30" width="14" height="12" rx="2" fill="#A3BE8C" class="glow-green" />
      <!-- Row 2 -->
      <rect x="12" y="48" width="14" height="12" rx="2" fill="#2E3440" />
      <rect x="34" y="48" width="14" height="12" rx="2" fill="#BF616A" opacity="0.4" />
      <rect x="56" y="48" width="14" height="12" rx="2" fill="#BF616A" opacity="0.4" />
      <rect x="78" y="48" width="14" height="12" rx="2" fill="#2E3440" />
      <!-- Row 3 -->
      <rect x="12" y="66" width="14" height="12" rx="2" fill="#A3BE8C" class="glow-green" />
      <rect x="34" y="66" width="14" height="12" rx="2" fill="#A3BE8C" class="glow-green" />
      <rect x="56" y="66" width="14" height="12" rx="2" fill="#2E3440" />
      <rect x="78" y="66" width="14" height="12" rx="2" fill="#2E3440" />
      <!-- Binder Rings -->
      <rect x="25" y="-5" width="4" height="10" rx="2" fill="#88C0D0" />
      <rect x="80" y="-5" width="4" height="10" rx="2" fill="#88C0D0" />
    </g>

    <!-- Glowing Credit Card / Booking Success Badge -->
    <g transform="translate(195, 135)">
      <rect width="100" height="42" rx="5" fill="#242933" stroke="#A3BE8C" stroke-width="1.5" class="glow-green" />
      <!-- Success Icon pulsating -->
      <circle cx="20" cy="21" r="9" fill="#A3BE8C" fill-opacity="0.25">
        <animate attributeName="r" values="7;11;7" dur="2s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cx="20" cy="21" r="7" fill="#A3BE8C" />
      <path d="M17,21 L19,23 L23,19" stroke="#242933" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      
      <!-- Amount text -->
      <text x="38" y="18" font-family="'Inter', sans-serif" font-weight="800" font-size="8" fill="#FFFFFF">Room Booked</text>
      <text x="38" y="29" font-family="'Fira Code', monospace" font-weight="600" font-size="7" fill="#A3BE8C">$185.00 Success</text>
    </g>
    
    <!-- Spark / Glowing Stars (Pulsating) -->
    <g transform="translate(50, 45)" class="glow-orange">
      <polygon points="5,0 7,4 11,5 7,7 6,11 4,7 0,6 4,4" fill="#EBCB8B" />
      <animateTransform attributeName="transform" type="scale" values="1;1.4;1" dur="2s" repeatCount="indefinite" transform-origin="5.5 5.5" additive="sum" />
    </g>
    <g transform="translate(325, 95)" class="glow-green">
      <polygon points="4,0 5,3 8,4 5,5 4,8 3,5 0,4 3,3" fill="#A3BE8C" />
      <animateTransform attributeName="transform" type="scale" values="1;1.4;1" dur="2.5s" repeatCount="indefinite" transform-origin="4 4" additive="sum" />
    </g>
  </g>

  <!-- ==================== TEXT & DETAILS ==================== -->
  <!-- Tech Stack -->
  <g transform="translate(190, 325)">
    <text text-anchor="middle" class="tech">Spring Boot • React • JPA • MySQL</text>
  </g>

  <!-- Description Body -->
  <g transform="translate(190, 355)" font-size="12" fill="#8B949E">
    <text text-anchor="middle" class="desc">Full-stack hotel reservation platform.</text>
    <text text-anchor="middle" class="desc" y="20">Features real-time booking grids and dynamic scheduling.</text>
    <text text-anchor="middle" class="desc" y="40">Optimized database indexing for transaction safety.</text>
  </g>
</svg>
