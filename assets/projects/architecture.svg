<svg width="850" height="360" viewBox="0 0 850 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg-card { fill: #0D1117; stroke: url(#outer-grad); stroke-width: 1.5; }
    .node-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.5px; }
    .node-text { font-family: 'Fira Code', monospace; font-weight: 500; font-size: 10px; fill: #8B949E; }
    .header-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 14px; fill: #FFFFFF; letter-spacing: 1px; }
    .flow-line { stroke: #4f5b66; stroke-width: 2; stroke-dasharray: 4 4; animation: dash 10s linear infinite; }
    .active-line { stroke: url(#line-grad); stroke-width: 2; }
    
    /* Neon glow colors */
    .glow-react { fill: #0D1117; stroke: #61DAFB; stroke-width: 1.5; filter: url(#glow-cyan); }
    .glow-nginx { fill: #0D1117; stroke: #a855f7; stroke-width: 1.5; filter: url(#glow-purple); }
    .glow-security { fill: #0D1117; stroke: #FF6B6B; stroke-width: 1.5; filter: url(#glow-red); }
    .glow-service { fill: #0D1117; stroke: #6C63FF; stroke-width: 1.5; filter: url(#glow-indigo); }
    .glow-db { fill: #0D1117; stroke: #22c55e; stroke-width: 1.5; filter: url(#glow-green); }

    /* Node Labels */
    .lbl-cyan { fill: #61DAFB; }
    .lbl-purple { fill: #c084fc; }
    .lbl-red { fill: #FF8A8A; }
    .lbl-indigo { fill: #a78bfa; }
    .lbl-green { fill: #4ade80; }
  </style>

  <defs>
    <!-- Node Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-indigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Marker Arrows -->
    <marker id="arrow-cyan" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#61DAFB" />
    </marker>
    <marker id="arrow-purple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a855f7" />
    </marker>
    <marker id="arrow-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#FF6B6B" />
    </marker>
    <marker id="arrow-indigo" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6C63FF" />
    </marker>
    <marker id="arrow-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#22c55e" />
    </marker>

    <!-- Linear Gradients -->
    <linearGradient id="outer-grad" x1="0" y1="0" x2="850" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FF6B6B" stop-opacity="0.8"/>
    </linearGradient>
    
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect x="1" y="1" width="848" height="358" rx="8" class="bg-card" />

  <!-- Diagram Title Header -->
  <g transform="translate(30, 32)">
    <rect width="6" height="16" rx="2" fill="#6C63FF" />
    <text x="15" y="13" class="header-text">SYSTEM ARCHITECTURE &amp; MICROSERVICES PIPELINE</text>
  </g>

  <!-- ==================== NODES LAYOUT ==================== -->

  <!-- NODE 1: React Client -->
  <g transform="translate(30, 140)">
    <rect width="160" height="80" rx="8" class="glow-react" />
    <text x="15" y="24" class="node-title lbl-cyan">React Frontend</text>
    <text x="15" y="44" class="node-text">• Vite Dev Server</text>
    <text x="15" y="58" class="node-text">• Axios API Client</text>
    <text x="15" y="70" class="node-text">• Tailwind UI / v4</text>
  </g>

  <!-- NODE 2: Nginx Gateway -->
  <g transform="translate(240, 140)">
    <rect width="160" height="80" rx="8" class="glow-nginx" />
    <text x="15" y="24" class="node-title lbl-purple">Nginx API Gateway</text>
    <text x="15" y="44" class="node-text">• Reverse Proxy</text>
    <text x="15" y="58" class="node-text">• SSL Termination</text>
    <text x="15" y="70" class="node-text">• Route Dispatcher</text>
  </g>

  <!-- NODE 3: Spring Security Filter -->
  <g transform="translate(450, 140)">
    <rect width="160" height="80" rx="8" class="glow-security" />
    <text x="15" y="24" class="node-title lbl-red">Spring Security</text>
    <text x="15" y="44" class="node-text">• JWT Filter Chain</text>
    <text x="15" y="58" class="node-text">• 2FA Email OTP</text>
    <text x="15" y="70" class="node-text">• RBAC Validation</text>
  </g>

  <!-- NODE 4a: User Service -->
  <g transform="translate(660, 40)">
    <rect width="160" height="64" rx="8" class="glow-service" />
    <text x="15" y="22" class="node-title lbl-indigo">User Service</text>
    <text x="15" y="40" class="node-text">• Auth &amp; Profiles</text>
    <text x="15" y="52" class="node-text">• Team Assignments</text>
  </g>

  <!-- NODE 4b: Solution Service -->
  <g transform="translate(660, 148)">
    <rect width="160" height="64" rx="8" class="glow-service" />
    <text x="15" y="22" class="node-title lbl-indigo">Solution Service</text>
    <text x="15" y="40" class="node-text">• MCQ Test Engine</text>
    <text x="15" y="52" class="node-text">• Result Grading</text>
  </g>

  <!-- NODE 4c: Notification Service -->
  <g transform="translate(660, 256)">
    <rect width="160" height="64" rx="8" class="glow-service" />
    <text x="15" y="22" class="node-title lbl-indigo">Notification Service</text>
    <text x="15" y="40" class="node-text">• JavaMailSender</text>
    <text x="15" y="52" class="node-text">• OTP Broadcasts</text>
  </g>

  <!-- NODE 5: MySQL Database Cluster -->
  <g transform="translate(450, 256)">
    <rect width="160" height="64" rx="8" class="glow-db" />
    <text x="15" y="22" class="node-title lbl-green">MySQL Database Hub</text>
    <text x="15" y="40" class="node-text">• Liquibase Schema</text>
    <text x="15" y="52" class="node-text">• Hibernate JPA Cache</text>
  </g>

  <!-- ==================== FLOW CONNECTORS ==================== -->

  <!-- Connect React -> Nginx -->
  <path d="M190,180 L232,180" stroke="#61DAFB" stroke-width="2" marker-end="url(#arrow-cyan)" />

  <!-- Connect Nginx -> Spring Security -->
  <path d="M400,180 L442,180" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)" />

  <!-- Connect Spring Security -> Microservices -->
  <!-- Line to User Service (4a) -->
  <path d="M610,165 L635,165 L635,72 L652,72" stroke="#FF6B6B" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />
  
  <!-- Line to Solution Service (4b) -->
  <path d="M610,180 L652,180" stroke="#FF6B6B" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />
  
  <!-- Line to Notification Service (4c) -->
  <path d="M610,195 L635,195 L635,288 L652,288" stroke="#FF6B6B" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />

  <!-- Database connections -->
  <!-- User Service to DB -->
  <path d="M660,88 L580,88 L580,248" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arrow-green)" />

  <!-- Solution Service to DB -->
  <path d="M660,190 L530,190 L530,248" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arrow-green)" />

  <!-- Legend Indicators (Top Right Corner) -->
  <g transform="translate(680, 15)" font-family="Inter, sans-serif" font-size="9" font-weight="600">
    <circle cx="10" cy="5" r="4" fill="#61DAFB" />
    <text x="20" y="8" fill="#8B949E">Web</text>
    
    <circle cx="50" cy="5" r="4" fill="#a855f7" />
    <text x="60" y="8" fill="#8B949E">Gateway</text>
    
    <circle cx="105" cy="5" r="4" fill="#FF6B6B" />
    <text x="115" y="8" fill="#8B949E">Security</text>
  </g>
</svg>
