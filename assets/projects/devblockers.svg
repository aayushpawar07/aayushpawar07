<svg xmlns="http://www.w3.org/2000/svg" width="380" height="440" viewBox="0 0 380 440" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#card-grad); stroke-width: 1.5; }
    .title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; fill: #FFFFFF; letter-spacing: 0.5px; }
    .tech { font-family: 'Fira Code', monospace; font-weight: 600; font-size: 11px; fill: #a855f7; letter-spacing: 0.5px; }
    .desc { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px; fill: #8B949E; }
    .glow-purple { filter: url(#glow-p); }
    .glow-cyan { filter: url(#glow-c); }
    .glow-green { filter: url(#glow-g); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-p" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-c" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Outer Gradient -->
    <linearGradient id="card-grad" x1="0" y1="0" x2="380" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#6C63FF" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="gate-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6C63FF" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect x="1" y="1" width="378" height="438" rx="12" class="card-bg" />

  <!-- Header Section -->
  <g transform="translate(190, 45)">
    <text text-anchor="middle" class="title">👥 DevBlockers Team Hub</text>
  </g>

  <!-- ==================== ILLUSTRATION AREA ==================== -->
  <g transform="translate(0, 75)">
    <!-- Base grid / background lines -->
    <circle cx="190" cy="105" r="85" stroke="#1F2937" stroke-width="1" stroke-dasharray="4 6" />
    <circle cx="190" cy="105" r="50" stroke="#1F2937" stroke-width="1" stroke-dasharray="2 4" />

    <!-- Connecting network lines -->
    <!-- Gateway to Admin Node (Cyan) -->
    <line x1="190" y1="105" x2="105" y2="55" stroke="#00d2ff" stroke-width="2.5" class="glow-cyan" />
    <!-- Gateway to Solutions Node (Orange) -->
    <line x1="190" y1="105" x2="275" y2="55" stroke="#FFA116" stroke-width="2.5" opacity="0.8" />
    <!-- Gateway to Notifications Node (Green) -->
    <line x1="190" y1="105" x2="190" y2="175" stroke="#22c55e" stroke-width="2.5" class="glow-green" />

    <!-- API Gateway Pulse Ripple -->
    <circle cx="190" cy="105" r="24" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="24;50" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="3s" repeatCount="indefinite" />
      <animate attributeName="stroke-width" values="2;0.5" dur="3s" repeatCount="indefinite" />
    </circle>

    <!-- CENTRAL NODE: API Gateway Hub -->
    <circle cx="190" cy="105" r="24" fill="url(#gate-grad)" class="glow-purple" />
    <!-- Lock details inside Gateway (Spring Security) -->
    <path d="M190 95.5c-2.4 0-4.3 1.9-4.3 4.3v3.5h-1.8c-.9 0-1.7.8-1.7 1.7v8.5c0 .9.8 1.7 1.7 1.7h12.1c1 0 1.7-.8 1.7-1.7v-8.5c0-.9-.7-1.7-1.7-1.7H194.3v-3.5c0-2.4-1.9-4.3-4.3-4.3zm0 1.7c1.4 0 2.5 1.1 2.5 2.6v3.5h-5v-3.5c0-1.5 1.1-2.6 2.5-2.6z" fill="#FFFFFF" />

    <!-- NODE A: Admin Service (Cyan) -->
    <g transform="translate(105, 55)">
      <circle r="18" fill="#0D1117" stroke="#00d2ff" stroke-width="2" class="glow-cyan" />
      <!-- Rotating Admin gear layout -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
        <path d="M-6,-2 L-6,2 L-2,6 L2,6 L6,2 L6,-2 L2,-6 L-2,-6 Z" fill="#00d2ff" opacity="0.3" />
        <circle r="6" fill="#00d2ff" />
        <circle r="3" fill="#0D1117" />
      </g>
      <!-- Node Label -->
      <rect x="-30" y="-32" width="60" height="10" rx="3" fill="#161B22" stroke="#30363D" stroke-width="0.5" />
      <text y="-25" font-family="'Inter', sans-serif" font-weight="800" font-size="6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.2">ADMIN SVC</text>
    </g>

    <!-- NODE B: Solutions Service (Orange) -->
    <g transform="translate(275, 55)">
      <circle r="18" fill="#0D1117" stroke="#FFA116" stroke-width="2" />
      <!-- Pulsing Checklist checkmark layout -->
      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1.12;1" dur="4s" repeatCount="indefinite" additive="sum" />
        <circle r="7" fill="#FFA116" fill-opacity="0.2" />
        <path d="M-4,0 L-1,3 L4,-2" stroke="#FFA116" stroke-width="2" stroke-linecap="round" fill="none" />
      </g>
      <!-- Node Label -->
      <rect x="-32" y="-32" width="64" height="10" rx="3" fill="#161B22" stroke="#30363D" stroke-width="0.5" />
      <text y="-25" font-family="'Inter', sans-serif" font-weight="800" font-size="6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.2">TEAM ALLOC</text>
    </g>

    <!-- NODE C: Notifications Service (Green) -->
    <g transform="translate(190, 175)">
      <circle r="18" fill="#0D1117" stroke="#22c55e" stroke-width="2" class="glow-green" />
      <!-- Floating Mail Envelope layout -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2.5; 0,0" dur="3s" repeatCount="indefinite" additive="sum" />
        <rect x="-8" y="-6" width="16" height="12" rx="2" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="1.2" />
        <path d="M-8,-4 L0,2 L8,-4" stroke="#22c55e" stroke-width="1.2" fill="none" />
      </g>
      <!-- Node Label -->
      <rect x="-30" y="22" width="60" height="10" rx="3" fill="#161B22" stroke="#30363D" stroke-width="0.5" />
      <text y="29" font-family="'Inter', sans-serif" font-weight="800" font-size="6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.2">NOTIF SVC</text>
    </g>
    
    <!-- Data pulse packets on connection paths -->
    <!-- Gateway to Admin Node Packet -->
    <circle cx="190" cy="105" r="3.5" fill="#00d2ff" class="glow-cyan">
      <animate attributeName="cx" values="190;105" dur="2s" repeatCount="indefinite" />
      <animate attributeName="cy" values="105;55" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Gateway to Solutions Node Packet -->
    <circle cx="190" cy="105" r="3.5" fill="#FFA116">
      <animate attributeName="cx" values="190;275" dur="2.4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="105;55" dur="2.4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" repeatCount="indefinite" />
    </circle>

    <!-- Gateway to Notifications Node Packet -->
    <circle cx="190" cy="105" r="3.5" fill="#22c55e" class="glow-green">
      <animate attributeName="cy" values="105;175" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="1.8s" repeatCount="indefinite" />
    </circle>

    <!-- Twinkling Sparkles -->
    <circle cx="70" cy="130" r="2.5" fill="#a855f7" class="glow-purple">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="2;3.2;2" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="310" cy="140" r="3" fill="#00d2ff" class="glow-cyan">
      <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;1.5;3" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ==================== TEXT & DETAILS ==================== -->
  <!-- Tech Stack -->
  <g transform="translate(190, 325)">
    <text text-anchor="middle" class="tech">Spring Boot • Microservices • JWT</text>
  </g>

  <!-- Description Body -->
  <g transform="translate(190, 355)" font-size="12" fill="#8B949E">
    <text text-anchor="middle" class="desc">Microservices Organization management.</text>
    <text text-anchor="middle" class="desc" y="20">Secure multi-tenant workspace team allocator.</text>
    <text text-anchor="middle" class="desc" y="40">Decoupled routing with high-speed token parsing.</text>
  </g>
</svg>
