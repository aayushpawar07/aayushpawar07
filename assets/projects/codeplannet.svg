<svg xmlns="http://www.w3.org/2000/svg" width="380" height="440" viewBox="0 0 380 440" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#card-grad); stroke-width: 1.5; }
    .title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; fill: #FFFFFF; letter-spacing: 0.5px; }
    .tech { font-family: 'Fira Code', monospace; font-weight: 600; font-size: 11px; fill: #6C63FF; letter-spacing: 0.5px; }
    .desc { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px; fill: #8B949E; }
    .glow-cyan { filter: url(#glow-c); }
    .glow-purple { filter: url(#glow-p); }
    .glow-yellow { filter: url(#glow-y); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-c" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-p" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-y" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Outer Gradient -->
    <linearGradient id="card-grad" x1="0" y1="0" x2="380" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FF6B6B" stop-opacity="0.8"/>
    </linearGradient>

    <!-- UI Gradients -->
    <linearGradient id="screen-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFA116" />
      <stop offset="100%" stop-color="#FF6B6B" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect x="1" y="1" width="378" height="438" rx="12" class="card-bg" />

  <!-- Header Section -->
  <g transform="translate(190, 45)">
    <text text-anchor="middle" class="title">🎯 AssessHub / CodePlannet</text>
  </g>

  <!-- ==================== ILLUSTRATION AREA ==================== -->
  <g transform="translate(0, 75)">
    <!-- Laptop Stand/Base -->
    <path d="M70,185 L310,185 L320,195 L60,195 Z" fill="#24292E" stroke="#30363D" stroke-width="1.5" />
    <rect x="160" y="180" width="60" height="8" fill="#1F2428" />
    <path d="M120,195 L260,195" stroke="#444D56" stroke-width="2" stroke-linecap="round" />

    <!-- Laptop Lid / Outer Frame -->
    <rect x="80" y="30" width="220" height="150" rx="8" fill="#2F363D" stroke="#444D56" stroke-width="1.5" />
    <!-- Screen Viewport -->
    <rect x="88" y="38" width="204" height="134" rx="4" fill="url(#screen-grad)" />

    <!-- Screen UI Elements (Mock Test Platform) -->
    <!-- Sidebar -->
    <rect x="94" y="44" width="40" height="122" rx="2" fill="#161B22" />
    <circle cx="114" cy="54" r="6" fill="#6C63FF" opacity="0.6" />
    <rect x="98" y="66" width="32" height="4" rx="1" fill="#30363D" />
    <rect x="98" y="74" width="32" height="4" rx="1" fill="#30363D" />
    <rect x="98" y="82" width="32" height="4" rx="1" fill="#30363D" />

    <!-- MCQ Quiz Header -->
    <rect x="140" y="44" width="146" height="16" rx="3" fill="#161B22" />
    <text x="146" y="55" font-family="'Inter', sans-serif" font-weight="700" font-size="7" fill="#6C63FF">MCQ Platform Assessment</text>
    <rect x="250" y="48" width="30" height="8" rx="2" fill="#22c55e" fill-opacity="0.2" />
    <circle cx="254" cy="52" r="2" fill="#22c55e">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Question Box -->
    <rect x="140" y="66" width="146" height="42" rx="3" fill="#161B22" />
    <rect x="146" y="72" width="120" height="3" rx="1.5" fill="#8B949E" />
    <rect x="146" y="79" width="100" height="3" rx="1.5" fill="#8B949E" />
    <!-- Radio Choices -->
    <circle cx="150" cy="91" r="3" fill="#1F2937" stroke="#30363D" stroke-width="1" />
    <circle cx="150" cy="91" r="1.5" fill="#6C63FF" class="glow-purple">
      <animate attributeName="r" values="1;2;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <rect x="158" y="89" width="50" height="3" rx="1.5" fill="#8B949E" />

    <!-- Radio Choice 2 (Animated Click Select) -->
    <circle cx="150" cy="100" r="3" fill="#1F2937" stroke="#30363D" stroke-width="1">
      <animate attributeName="fill" values="#1F2937;#1F2937;#22c55e;#1F2937" keyTimes="0;0.35;0.75;1" dur="7s" repeatCount="indefinite" />
      <animate attributeName="stroke" values="#30363D;#30363D;#22c55e;#30363D" keyTimes="0;0.35;0.75;1" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="150" cy="100" r="1.5" fill="none" class="glow-green">
      <animate attributeName="fill" values="none;none;#22c55e;none" keyTimes="0;0.35;0.75;1" dur="7s" repeatCount="indefinite" />
      <animate attributeName="r" values="0;0;1.5;0" keyTimes="0;0.35;0.75;1" dur="7s" repeatCount="indefinite" />
    </circle>
    <rect x="158" y="98" width="65" height="3" rx="1.5" fill="#4f5b66" />

    <!-- Animated Cursor Click Arrow -->
    <g transform="translate(0, 0)">
      <animateTransform attributeName="transform" type="translate" values="260,150; 150,100; 150,100; 260,150" keyTimes="0;0.35;0.75;1" dur="7s" repeatCount="indefinite" />
      <!-- Small Arrow Pointer icon -->
      <path d="M0,0 L2,10 L5,7 L9,11 L11,9 L7,5 L10,2 Z" fill="#FFFFFF" stroke="#111827" stroke-width="0.75" />
      <!-- Expanding ripple ring when clicking -->
      <circle cx="0" cy="0" r="0" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0">
        <animate attributeName="r" values="0;0;10;0" keyTimes="0;0.35;0.65;1" dur="7s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;0.8;0" keyTimes="0;0.35;0.65;1" dur="7s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Circular Progress Dials (Grades animated) -->
    <rect x="140" y="114" width="68" height="46" rx="3" fill="#161B22" />
    <!-- Dial -->
    <circle cx="174" cy="132" r="12" stroke="#1F2937" stroke-width="2.5" fill="none" />
    <circle cx="174" cy="132" r="12" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-dasharray="75" stroke-dashoffset="75" stroke-linecap="round" class="glow-cyan">
      <animate attributeName="stroke-dashoffset" values="75;20;75" dur="6s" repeatCount="indefinite" />
    </circle>
    <text x="174" y="135" font-family="'Inter', sans-serif" font-weight="800" font-size="8" fill="#FFFFFF" text-anchor="middle">
      <animate attributeName="fill" values="#FFFFFF;#22c55e;#FFFFFF" dur="3s" repeatCount="indefinite" />
      85%
    </text>
    <text x="174" y="153" font-family="'Inter', sans-serif" font-weight="600" font-size="6" fill="#8B949E" text-anchor="middle">Pass Rate</text>

    <!-- Extra UI Info Card -->
    <rect x="214" y="114" width="72" height="46" rx="3" fill="#161B22" />
    <rect x="220" y="122" width="45" height="3.5" rx="1.5" fill="#30363D" />
    <rect x="220" y="130" width="30" height="3.5" rx="1.5" fill="#30363D" />
    <rect x="220" y="138" width="55" height="3.5" rx="1.5" fill="#30363D" />
    <rect x="220" y="146" width="40" height="3.5" rx="1.5" fill="#6C63FF" opacity="0.6" />

    <!-- Glowing Security Shield Overlay (JWT/2FA pulsating) -->
    <g transform="translate(265, 125)" class="glow-yellow">
      <animateTransform attributeName="transform" type="translate" values="265,125; 265,123; 265,125" dur="2.5s" repeatCount="indefinite" additive="sum" />
      <path d="M18 2.5 L6 7.5 L6 17 C6 24 12 28.5 18 31 C24 28.5 30 24 30 17 L30 7.5 Z" fill="url(#shield-grad)">
        <animate attributeName="fill-opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite" />
      </path>
      <!-- Inner detail -->
      <path d="M18 6 L10 9.3 L10 17 C10 22.3 14.5 25.8 18 27.8 L18 6 Z" fill="#FFFFFF" fill-opacity="0.25" />
      <!-- Lock Icon inside shield -->
      <path d="M18 11.5c-1.4 0-2.5 1.1-2.5 2.5v2h-1c-.5 0-1 .5-1 1v5c0 .5.5 1 1 1h7c.5 0 1-.5 1-1v-5c0-.5-.5-1-1-1h-1v-2c0-1.4-1.1-2.5-2.5-2.5zm0 1c.8 0 1.5.7 1.5 1.5v2h-3v-2c0-.8.7-1.5 1.5-1.5z" fill="#FFFFFF" />
    </g>

    <!-- Spark Elements -->
    <path d="M50,40 L53,46 L60,47 L55,52 L56,58 L50,54 L44,58 L45,52 L40,47 L47,46 Z" fill="#6C63FF" opacity="0.2" class="glow-purple" />
    <circle cx="310" cy="50" r="3" fill="#22c55e" class="glow-cyan" />
    <circle cx="55" cy="130" r="2.5" fill="#FFA116" class="glow-yellow" />
  </g>

  <!-- ==================== TEXT & DETAILS ==================== -->
  <!-- Tech Stack -->
  <g transform="translate(190, 325)">
    <text text-anchor="middle" class="tech">Spring Boot • React • JWT • AWS</text>
  </g>

  <!-- Description Body -->
  <g transform="translate(190, 355)" font-size="12" fill="#8B949E">
    <text text-anchor="middle" class="desc">Full-stack role-based MCQ Testing Platform.</text>
    <text text-anchor="middle" class="desc" y="20">Engineered with secure 2FA and active grading.</text>
    <text text-anchor="middle" class="desc" y="40">Deployed securely on cloud microservice infrastructure.</text>
  </g>
</svg>
