<svg xmlns="http://www.w3.org/2000/svg" width="280" height="160" viewBox="0 0 280 160" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#border-grad); stroke-width: 1.5; }
    .label { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 13px; fill: #FFFFFF; letter-spacing: 1px; }
    .sub { font-family: 'Fira Code', monospace; font-weight: 600; font-size: 9px; fill: #6C63FF; letter-spacing: 0.5px; }
    .glow-purple { filter: url(#glow-p); }
    .glow-cyan { filter: url(#glow-c); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-p" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-c" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Border Gradient -->
    <linearGradient id="border-grad" x1="0" y1="0" x2="280" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Icon Gradient -->
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#FF6B6B" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="278" height="158" rx="10" class="card-bg" />

  <!-- Code Grid / Tech Background details -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1">
    <path d="M 0,20 L 280,20 M 0,40 L 280,40 M 0,60 L 280,60 M 0,80 L 280,80 M 0,100 L 280,100 M 0,120 L 280,120 M 0,140 L 280,140" />
    <path d="M 40,0 L 40,160 M 80,0 L 80,160 M 120,0 L 120,160 M 160,0 L 160,160 M 200,0 L 200,160 M 240,0 L 240,160" />
  </g>

  <!-- Terminal Frame Representation -->
  <g transform="translate(20, 20)">
    <!-- Terminal Screen -->
    <rect x="0" y="0" width="70" height="50" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <!-- Header -->
    <path d="M0,8 L70,8" stroke="#30363D" stroke-width="1" />
    <!-- Window Controls -->
    <circle cx="6" cy="4" r="1.5" fill="#FF5F56" />
    <circle cx="11" cy="4" r="1.5" fill="#FFBD2E" />
    <circle cx="16" cy="4" r="1.5" fill="#27C93F" />
    <!-- Prompt -->
    <text x="6" y="20" font-family="'Fira Code', monospace" font-size="6" fill="#6C63FF">&gt;_</text>
    <rect x="18" y="16" width="25" height="4" rx="1" fill="#FFFFFF" fill-opacity="0.6" />
    <rect x="6" y="26" width="40" height="4" rx="1" fill="#8B949E" />
    <rect x="6" y="34" width="30" height="4" rx="1" fill="#8B949E" />
  </g>

  <!-- Main Illustration (Java Coffee / Spring Cup) -->
  <g transform="translate(145, 15)">
    <!-- Glowing Halo -->
    <circle cx="45" cy="40" r="30" fill="#6C63FF" fill-opacity="0.1" class="glow-purple" />

    <!-- Coffee Cup Profile -->
    <path d="M25,25 L65,25 C65,48 25,48 25,25 Z" fill="url(#icon-grad)" stroke="#FFFFFF" stroke-width="1" class="glow-purple" />
    <!-- Handle -->
    <path d="M65,30 C72,30 72,40 65,40" fill="none" stroke="url(#icon-grad)" stroke-width="2" stroke-linecap="round" class="glow-purple" />
    <!-- Plate / Saucer -->
    <path d="M20,50 L70,50" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />

    <!-- Rising Steam Lines -->
    <path d="M35,18 C33,12 37,8 35,2" fill="none" stroke="#FFA116" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
    <path d="M45,18 C43,12 47,8 45,2" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
    <path d="M55,18 C53,12 57,8 55,2" fill="none" stroke="#6C63FF" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />

    <!-- Leaf Core details (Spring Spring) -->
    <path d="M45,30 Q47,38 43,44 Q49,38 45,30 Z" fill="#22c55e" opacity="0.9" class="glow-cyan" />
  </g>

  <!-- Title & Description Text Inside Card -->
  <g transform="translate(25, 110)">
    <text class="label" x="0" y="0">💼 FULL-TIME ROLE</text>
    <text class="sub" x="0" y="16">SPRING BOOT • BACKEND DEV</text>
    <line x1="0" y1="26" x2="230" y2="26" stroke="#30363D" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
