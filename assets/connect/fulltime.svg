<svg xmlns="http://www.w3.org/2000/svg" width="380" height="440" viewBox="0 0 380 440" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#card-grad); stroke-width: 1.5; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 18px; fill: #FFFFFF; letter-spacing: 0.5px; }
    .subtitle { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; font-weight: 700; font-size: 10px; fill: #6C63FF; letter-spacing: 2px; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 12px; fill: #E6EDF0; }
    .percent { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; font-weight: 700; font-size: 11px; fill: #6C63FF; }
    .perk-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 10px; fill: #FF6B6B; letter-spacing: 0.5px; }
    .perk-text-2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 10px; fill: #6C63FF; letter-spacing: 0.5px; }
    .glow-purple { filter: url(#glow-p); }
    .glow-cyan { filter: url(#glow-c); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-p" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-c" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Outer Gradient -->
    <linearGradient id="card-grad" x1="0" y1="0" x2="380" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FF6B6B" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Icon Gradient -->
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#FF6B6B" />
    </linearGradient>

    <!-- Progress Bar Gradient -->
    <linearGradient id="bar-grad" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#FF6B6B" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect x="1" y="1" width="378" height="438" rx="16" class="card-bg" />

  <!-- Header Section -->
  <g transform="translate(190, 42)">
    <text text-anchor="middle" class="title">💼 FULL-TIME ROLE</text>
  </g>

  <!-- ==================== ILLUSTRATION AREA ==================== -->
  <g transform="translate(0, 55)">
    <!-- Base Ground Line -->
    <line x1="40" y1="130" x2="340" y2="130" stroke="#30363D" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Dashed Speed trails -->
    <line x1="280" y1="120" x2="310" y2="120" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="6 4" class="glow-purple">
      <animate attributeName="stroke-dashoffset" values="30;0" dur="0.8s" repeatCount="indefinite" />
    </line>
    <line x1="60" y1="120" x2="90" y2="120" stroke="#6C63FF" stroke-width="1.5" stroke-dasharray="6 4" class="glow-purple">
      <animate attributeName="stroke-dashoffset" values="0;30" dur="0.8s" repeatCount="indefinite" />
    </line>

    <!-- Terminal Mock Panel (Left side) -->
    <g transform="translate(45, 15)">
      <!-- Terminal Screen -->
      <rect x="0" y="0" width="120" height="95" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <!-- Header Bar -->
      <path d="M0,16 L120,16" stroke="#30363D" stroke-width="1" />
      <!-- Window Controls -->
      <circle cx="10" cy="8" r="3" fill="#FF5F56" />
      <circle cx="20" cy="8" r="3" fill="#FFBD2E" />
      <circle cx="30" cy="8" r="3" fill="#27C93F" />
      <!-- Prompt & Code Typing Animation -->
      <text x="12" y="34" font-family="ui-monospace, monospace" font-size="9" fill="#6C63FF" font-weight="bold">&gt;_</text>
      <g>
        <rect x="30" y="27" width="45" height="8" rx="2" fill="#E6EDF0" fill-opacity="0.8" />
        <rect x="12" y="45" width="85" height="8" rx="2" fill="#8B949E" fill-opacity="0.6" />
        <rect x="12" y="62" width="60" height="8" rx="2" fill="#FF6B6B" fill-opacity="0.7" />
        <rect x="12" y="79" width="40" height="8" rx="2" fill="#6C63FF" fill-opacity="0.7" />
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
      </g>
    </g>

    <!-- Main Coffee Cup Illustration (Right side) -->
    <g transform="translate(205, 10)">
      <!-- Glowing Halo -->
      <circle cx="50" cy="45" r="35" fill="#6C63FF" fill-opacity="0.1" class="glow-purple">
        <animate attributeName="r" values="30;38;30" dur="3s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" values="0.05;0.18;0.05" dur="3s" repeatCount="indefinite" />
      </circle>

      <!-- Coffee Cup Body -->
      <path d="M25,25 L75,25 C75,55 25,55 25,25 Z" fill="url(#icon-grad)" stroke="#FFFFFF" stroke-width="1.5" class="glow-purple" />
      <!-- Handle -->
      <path d="M75,30 C85,30 85,45 75,45" fill="none" stroke="url(#icon-grad)" stroke-width="2.5" stroke-linecap="round" class="glow-purple" />
      <!-- Plate / Saucer -->
      <path d="M15,58 L85,58" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />

      <!-- Rising Steam Lines -->
      <path d="M35,18 C33,12 37,8 35,2" fill="none" stroke="#FFA116" stroke-width="2" stroke-linecap="round">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6" dur="2s" repeatCount="indefinite" additive="sum" />
        <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite" />
      </path>
      <path d="M50,18 C48,12 52,8 50,2" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6" dur="2s" begin="0.6s" repeatCount="indefinite" additive="sum" />
        <animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.6s" repeatCount="indefinite" />
      </path>
      <path d="M65,18 C63,12 67,8 65,2" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6" dur="2s" begin="1.2s" repeatCount="indefinite" additive="sum" />
        <animate attributeName="opacity" values="0.8;0" dur="2s" begin="1.2s" repeatCount="indefinite" />
      </path>

      <!-- Leaf Core details -->
      <path d="M50,30 Q53,40 47,48 Q55,40 50,30 Z" fill="#22c55e" opacity="0.9" class="glow-cyan">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
      </path>
    </g>
    
    <!-- Twinkling Sparkles -->
    <circle cx="60" cy="15" r="2.5" fill="#22c55e" class="glow-cyan">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="r" values="2;3.2;2" dur="2.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="100" r="3" fill="#6C63FF" class="glow-purple">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;1.5;3" dur="2.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ==================== STATS / SPECIFICATIONS ==================== -->
  <!-- Stats Header -->
  <g transform="translate(40, 215)">
    <text class="subtitle">DEVELOPER STATS : ACTIVE</text>
  </g>

  <!-- Stat Row 1: Spring Boot -->
  <g transform="translate(0, 242)">
    <text x="40" class="label">Spring Boot &amp; Microservices</text>
    <text x="340" text-anchor="end" class="percent">95%</text>
    <!-- Progress Bar Track -->
    <rect x="40" y="8" width="300" height="8" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <!-- Progress Bar Fill with Animation -->
    <rect x="40" y="8" width="0" height="8" rx="4" fill="url(#bar-grad)" class="glow-purple">
      <animate attributeName="width" from="0" to="285" dur="1.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" />
    </rect>
  </g>

  <!-- Stat Row 2: Java Backend -->
  <g transform="translate(0, 282)">
    <text x="40" class="label">Core Java &amp; Secure REST APIs</text>
    <text x="340" text-anchor="end" class="percent">90%</text>
    <!-- Progress Bar Track -->
    <rect x="40" y="8" width="300" height="8" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <!-- Progress Bar Fill with Animation -->
    <rect x="40" y="8" width="0" height="8" rx="4" fill="url(#bar-grad)" class="glow-purple">
      <animate attributeName="width" from="0" to="270" dur="1.2s" begin="0.1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" />
    </rect>
  </g>

  <!-- Stat Row 3: Backend Architecture -->
  <g transform="translate(0, 322)">
    <text x="40" class="label">System Design &amp; Databases</text>
    <text x="340" text-anchor="end" class="percent">85%</text>
    <!-- Progress Bar Track -->
    <rect x="40" y="8" width="300" height="8" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <!-- Progress Bar Fill with Animation -->
    <rect x="40" y="8" width="0" height="8" rx="4" fill="url(#bar-grad)" class="glow-purple">
      <animate attributeName="width" from="0" to="255" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" />
    </rect>
  </g>

  <!-- ==================== FOOTER PERKS ==================== -->
  <g transform="translate(0, 372)">
    <!-- Pill 1 (Left) -->
    <rect x="40" y="0" width="140" height="32" rx="16" fill="#161B22" stroke="#FF6B6B" stroke-width="1.5" />
    <text x="110" y="20" text-anchor="middle" class="perk-text">⚡ ACTIVE BUFF</text>

    <!-- Pill 2 (Right) -->
    <rect x="200" y="0" width="140" height="32" rx="16" fill="#161B22" stroke="#6C63FF" stroke-width="1.5" />
    <text x="270" y="20" text-anchor="middle" class="perk-text-2">☕ COFFEE-POWERED</text>
  </g>
</svg>
