<svg xmlns="http://www.w3.org/2000/svg" width="380" height="440" viewBox="0 0 380 440" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#card-grad); stroke-width: 1.5; }
    .title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; fill: #FFFFFF; letter-spacing: 0.5px; }
    .tech { font-family: 'Fira Code', monospace; font-weight: 600; font-size: 11px; fill: #22c55e; letter-spacing: 0.5px; }
    .desc { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px; fill: #8B949E; }
    .glow-green { filter: url(#glow-g); }
    .glow-cyan { filter: url(#glow-c); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-c" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Outer Gradient -->
    <linearGradient id="card-grad" x1="0" y1="0" x2="380" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#00f2fe" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Icon Gradient -->
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect x="1" y="1" width="378" height="438" rx="12" class="card-bg" />

  <!-- Header Section -->
  <g transform="translate(190, 45)">
    <text text-anchor="middle" class="title">🛠️ FREELANCE SERVICES</text>
  </g>

  <!-- ==================== ILLUSTRATION AREA ==================== -->
  <g transform="translate(0, 75)">
    <!-- Base Ground Line -->
    <line x1="50" y1="185" x2="330" y2="185" stroke="#30363D" stroke-width="2" stroke-linecap="round" />
    
    <!-- Dashed Speed trails (Animated) -->
    <line x1="280" y1="175" x2="310" y2="175" stroke="#00f2fe" stroke-width="2" stroke-dasharray="6 4" class="glow-cyan">
      <animate attributeName="stroke-dashoffset" values="30;0" dur="0.8s" repeatCount="indefinite" />
    </line>
    <line x1="60" y1="175" x2="90" y2="175" stroke="#22c55e" stroke-width="2" stroke-dasharray="6 4" class="glow-green">
      <animate attributeName="stroke-dashoffset" values="0;30" dur="0.8s" repeatCount="indefinite" />
    </line>

    <!-- Gear & API Brackets Panel (Left side) -->
    <g transform="translate(55, 45)">
      <!-- Tiny Gear representation -->
      <path d="M15,5 L20,5 L22,9 L26,7 L29,10 L27,14 L30,17 L30,22 L26,24 L27,28 L24,31 L20,29 L17,32 L12,32 L10,28 L6,30 L3,27 L5,23 L2,20 L2,15 L6,13 L5,9 L8,6 L12,8 Z" fill="none" stroke="#30363D" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="0 16 18.5" to="360 16 18.5" dur="12s" repeatCount="indefinite" />
      </path>
      <circle cx="16" cy="18.5" r="5" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <!-- API tag JSON brackets -->
      <rect x="25" y="28" width="55" height="25" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <text x="32" y="44" font-family="'Fira Code', monospace" font-size="9" fill="#00f2fe" class="glow-cyan">{ API }
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
      </text>
    </g>

    <!-- Main Cloud Illustration (Right side) -->
    <g transform="translate(205, 35)">
      <!-- Glowing Halo -->
      <circle cx="45" cy="40" r="30" fill="#22c55e" fill-opacity="0.1" class="glow-green">
        <animate attributeName="r" values="26;34;26" dur="3s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" values="0.05;0.2;0.05" dur="3s" repeatCount="indefinite" />
      </circle>

      <!-- Cloud and Server group to float together -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2.5; 0,0" dur="4s" repeatCount="indefinite" />
        
        <!-- Cloud Silhouette -->
        <path d="M25,48 C20,48 16,44 16,39 C16,35 19,31 23,30.5 C25,23 32,18 40,18 C47,18 53,22 55.5,28 C61,28 65,32 65,37.5 C65,43.3 60.3,48 54.5,48 Z" fill="url(#icon-grad)" stroke="#FFFFFF" stroke-width="1" class="glow-green" opacity="0.9" />

        <!-- Server Server/Db Tray inside Cloud -->
        <rect x="30" y="32" width="28" height="6" rx="1.5" fill="#111827" stroke="#FFFFFF" stroke-width="0.8" />
        <circle cx="34" cy="35" r="1" fill="#22c55e" class="glow-green">
          <animate attributeName="fill" values="#22c55e;#00f2fe;#22c55e" dur="1.6s" repeatCount="indefinite" />
        </circle>
        <line x1="38" y1="35" x2="52" y2="35" stroke="#8B949E" stroke-width="0.8" />

        <rect x="30" y="40" width="28" height="6" rx="1.5" fill="#111827" stroke="#FFFFFF" stroke-width="0.8" />
        <circle cx="34" cy="43" r="1" fill="#22c55e" class="glow-green">
          <animate attributeName="fill" values="#22c55e;#00f2fe;#22c55e" dur="1.6s" begin="0.8s" repeatCount="indefinite" />
        </circle>
        <line x1="38" y1="43" x2="52" y2="43" stroke="#8B949E" stroke-width="0.8" />
      </g>
    </g>
    
    <!-- Twinkling Sparkles -->
    <circle cx="65" cy="35" r="2.5" fill="#00f2fe" class="glow-cyan">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="r" values="2;3.2;2" dur="2.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="130" r="3" fill="#22c55e" class="glow-green">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;1.5;3" dur="2.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ==================== TEXT & DETAILS ==================== -->
  <!-- Tech Stack -->
  <g transform="translate(190, 325)">
    <text text-anchor="middle" class="tech">API DEVELOPMENT • DEVOPS &amp; CLOUD</text>
  </g>

  <!-- Description Body -->
  <g transform="translate(190, 355)" font-size="12" fill="#8B949E">
    <text text-anchor="middle" class="desc">REST API Development</text>
    <text text-anchor="middle" class="desc" y="20">Full-Stack Web Apps</text>
    <text text-anchor="middle" class="desc" y="40">Cloud Deployment &amp; DevOps</text>
  </g>
</svg>
