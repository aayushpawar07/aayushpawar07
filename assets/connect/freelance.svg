<svg xmlns="http://www.w3.org/2000/svg" width="380" height="440" viewBox="0 0 380 440" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#card-grad); stroke-width: 1.5; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 18px; fill: #FFFFFF; letter-spacing: 0.5px; }
    .subtitle { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; font-weight: 700; font-size: 10px; fill: #00f2fe; letter-spacing: 2px; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 12px; fill: #E6EDF0; }
    .percent { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; font-weight: 700; font-size: 11px; fill: #00f2fe; }
    .perk-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 10px; fill: #00f2fe; letter-spacing: 0.5px; }
    .perk-text-2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 10px; fill: #22c55e; letter-spacing: 0.5px; }
    .glow-green { filter: url(#glow-g); }
    .glow-cyan { filter: url(#glow-c); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-c" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Outer Gradient -->
    <linearGradient id="card-grad" x1="0" y1="0" x2="380" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#00f2fe" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Icon Gradient -->
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Progress Bar Gradient -->
    <linearGradient id="bar-grad" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect x="1" y="1" width="378" height="438" rx="16" class="card-bg" />

  <!-- Header Section -->
  <g transform="translate(190, 42)">
    <text text-anchor="middle" class="title">🛠️ FREELANCE SERVICES</text>
  </g>

  <!-- ==================== ILLUSTRATION AREA ==================== -->
  <g transform="translate(0, 55)">
    <!-- Base Ground Line -->
    <line x1="40" y1="130" x2="340" y2="130" stroke="#30363D" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Dashed Speed trails -->
    <line x1="280" y1="120" x2="310" y2="120" stroke="#00f2fe" stroke-width="1.5" stroke-dasharray="6 4" class="glow-cyan">
      <animate attributeName="stroke-dashoffset" values="30;0" dur="0.8s" repeatCount="indefinite" />
    </line>
    <line x1="60" y1="120" x2="90" y2="120" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 4" class="glow-green">
      <animate attributeName="stroke-dashoffset" values="0;30" dur="0.8s" repeatCount="indefinite" />
    </line>

    <!-- Gear & API Brackets Panel (Left side) -->
    <g transform="translate(45, 15)">
      <!-- Tiny Gear representation -->
      <path d="M15,5 L20,5 L22,9 L26,7 L29,10 L27,14 L30,17 L30,22 L26,24 L27,28 L24,31 L20,29 L17,32 L12,32 L10,28 L6,30 L3,27 L5,23 L2,20 L2,15 L6,13 L5,9 L8,6 L12,8 Z" fill="none" stroke="#30363D" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="0 16 18.5" to="360 16 18.5" dur="12s" repeatCount="indefinite" />
      </path>
      <circle cx="16" cy="18.5" r="5" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      
      <!-- API tag JSON brackets -->
      <rect x="25" y="32" width="70" height="35" rx="5" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <text x="35" y="54" font-family="ui-monospace, monospace" font-size="10" font-weight="bold" fill="#00f2fe" class="glow-cyan">{ API }
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
      </text>
    </g>

    <!-- Main Cloud Illustration (Right side) -->
    <g transform="translate(205, 10)">
      <!-- Glowing Halo -->
      <circle cx="50" cy="45" r="35" fill="#22c55e" fill-opacity="0.1" class="glow-green">
        <animate attributeName="r" values="30;38;30" dur="3s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" values="0.05;0.18;0.05" dur="3s" repeatCount="indefinite" />
      </circle>

      <!-- Cloud and Server group to float together -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="4s" repeatCount="indefinite" />
        
        <!-- Cloud Silhouette -->
        <path d="M25,48 C20,48 16,44 16,39 C16,35 19,31 23,30.5 C25,23 32,18 40,18 C47,18 53,22 55.5,28 C61,28 65,32 65,37.5 C65,43.3 60.3,48 54.5,48 Z" fill="url(#icon-grad)" stroke="#FFFFFF" stroke-width="1" class="glow-green" opacity="0.9" />

        <!-- Server Server/Db Tray inside Cloud -->
        <rect x="30" y="30" width="28" height="6" rx="1.5" fill="#111827" stroke="#FFFFFF" stroke-width="0.8" />
        <circle cx="34" cy="33" r="1" fill="#22c55e" class="glow-green">
          <animate attributeName="fill" values="#22c55e;#00f2fe;#22c55e" dur="1.6s" repeatCount="indefinite" />
        </circle>
        <line x1="38" y1="33" x2="52" y2="33" stroke="#8B949E" stroke-width="0.8" />

        <rect x="30" y="38" width="28" height="6" rx="1.5" fill="#111827" stroke="#FFFFFF" stroke-width="0.8" />
        <circle cx="34" cy="41" r="1" fill="#22c55e" class="glow-green">
          <animate attributeName="fill" values="#22c55e;#00f2fe;#22c55e" dur="1.6s" begin="0.8s" repeatCount="indefinite" />
        </circle>
        <line x1="38" y1="41" x2="52" y2="41" stroke="#8B949E" stroke-width="0.8" />
      </g>
    </g>
    
    <!-- Twinkling Sparkles -->
    <circle cx="60" cy="15" r="2.5" fill="#00f2fe" class="glow-cyan">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="r" values="2;3.2;2" dur="2.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="100" r="3" fill="#22c55e" class="glow-green">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;1.5;3" dur="2.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ==================== STATS / SPECIFICATIONS ==================== -->
  <!-- Stats Header -->
  <g transform="translate(40, 215)">
    <text class="subtitle">SYSTEM ARCHITECT : ON-DEMAND</text>
  </g>

  <!-- Stat Row 1: REST API -->
  <g transform="translate(0, 242)">
    <text x="40" class="label">High-Performance REST APIs</text>
    <text x="340" text-anchor="end" class="percent">98%</text>
    <!-- Progress Bar Track -->
    <rect x="40" y="8" width="300" height="8" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <!-- Progress Bar Fill with Animation -->
    <rect x="40" y="8" width="0" height="8" rx="4" fill="url(#bar-grad)" class="glow-green">
      <animate attributeName="width" from="0" to="294" dur="1.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" />
    </rect>
  </g>

  <!-- Stat Row 2: Full-Stack -->
  <g transform="translate(0, 282)">
    <text x="40" class="label">Full-Stack Web Applications</text>
    <text x="340" text-anchor="end" class="percent">92%</text>
    <!-- Progress Bar Track -->
    <rect x="40" y="8" width="300" height="8" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <!-- Progress Bar Fill with Animation -->
    <rect x="40" y="8" width="0" height="8" rx="4" fill="url(#bar-grad)" class="glow-green">
      <animate attributeName="width" from="0" to="276" dur="1.2s" begin="0.1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" />
    </rect>
  </g>

  <!-- Stat Row 3: DevOps -->
  <g transform="translate(0, 322)">
    <text x="40" class="label">Cloud Deployment &amp; DevOps</text>
    <text x="340" text-anchor="end" class="percent">88%</text>
    <!-- Progress Bar Track -->
    <rect x="40" y="8" width="300" height="8" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <!-- Progress Bar Fill with Animation -->
    <rect x="40" y="8" width="0" height="8" rx="4" fill="url(#bar-grad)" class="glow-green">
      <animate attributeName="width" from="0" to="264" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" />
    </rect>
  </g>

  <!-- ==================== FOOTER PERKS ==================== -->
  <g transform="translate(0, 372)">
    <!-- Pill 1 (Left) -->
    <rect x="40" y="0" width="140" height="32" rx="16" fill="#161B22" stroke="#00f2fe" stroke-width="1.5" />
    <text x="110" y="20" text-anchor="middle" class="perk-text">🌐 CLOUD-NATIVE</text>

    <!-- Pill 2 (Right) -->
    <rect x="200" y="0" width="140" height="32" rx="16" fill="#161B22" stroke="#22c55e" stroke-width="1.5" />
    <text x="270" y="20" text-anchor="middle" class="perk-text-2">🚀 RAPID DELIVERY</text>
  </g>
</svg>
