<svg xmlns="http://www.w3.org/2000/svg" width="430" height="275" viewBox="0 0 430 275" fill="none">
  <style>
    .font-sans {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    
    .card-bg {
      fill: #111622;
      stroke: #21262D;
      stroke-width: 1.2;
      rx: 12px;
    }
    
    .divider {
      stroke: #21262D;
      stroke-width: 1;
      stroke-opacity: 0.6;
    }
    
    .label-key {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    
    .label-val {
      font-size: 12px;
      font-weight: 600;
      fill: #C9D1D9;
    }
    
    .val-highlight {
      fill: #E6EDF0;
      font-weight: 700;
    }
    
    .val-mono {
      fill: #00f2fe;
      font-weight: 700;
    }
  </style>

  <defs>
    <!-- Left vertical bar gradient -->
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="275" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF" />
      <stop offset="0.5" stop-color="#FF6B6B" />
      <stop offset="1" stop-color="#FFA116" />
    </linearGradient>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect x="1" y="1" width="428" height="273" rx="12" class="card-bg" />
  
  <!-- Left Side Accent Bar -->
  <path d="M 0 12 A 4 4 0 0 1 4 8 L 4 267 A 4 4 0 0 1 0 263 Z" fill="url(#bar-grad)" />

  <!-- ==================== ROW DIVIDERS ==================== -->
  <line x1="12" y1="48" x2="418" y2="48" class="divider" />
  <line x1="12" y1="84" x2="418" y2="84" class="divider" />
  <line x1="12" y1="120" x2="418" y2="120" class="divider" />
  <line x1="12" y1="156" x2="418" y2="156" class="divider" />
  <line x1="12" y1="192" x2="418" y2="192" class="divider" />
  <line x1="12" y1="228" x2="418" y2="228" class="divider" />

  <!-- ==================== ROWS ==================== -->
  <g class="font-sans">
    
    <!-- ─── ROW 1: Location ─── -->
    <!-- Vector Location Pin -->
    <g transform="translate(18, 14)" stroke="#FF6B6B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2 C8 2 5 5 5 9 C5 14 12 20 12 20 C12 20 19 14 19 9 C19 5 16 2 12 2 Z" />
      <circle cx="12" cy="9" r="2.5" fill="#FF6B6B" />
    </g>
    <text x="48" y="35" class="label-key" fill="#FF6B6B">Location</text>
    <text x="146" y="35" class="label-val val-highlight">Bhopal, Madhya Pradesh, India</text>

    <!-- ─── ROW 2: Education ─── -->
    <!-- Graduation Cap -->
    <g transform="translate(18, 50)" stroke="#C084FC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
      <path d="M6 12v5c0 2 3 3 6 3s6-1 6-3v-5" />
    </g>
    <text x="48" y="71" class="label-key" fill="#C084FC">Education</text>
    <text x="146" y="71" class="label-val">B.Tech in Computer Science</text>

    <!-- ─── ROW 3: Current Role ─── -->
    <!-- Briefcase -->
    <g transform="translate(18, 86)" stroke="#FB923C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="7" width="18" height="13" rx="2" />
      <path d="M16 7V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v3" />
    </g>
    <text x="48" y="107" class="label-key" fill="#FB923C">Current Role</text>
    <text x="146" y="107" class="label-val val-highlight">Java Developer @ Cloud Nexus</text>

    <!-- ─── ROW 4: Learning ─── -->
    <!-- Sprout -->
    <g transform="translate(18, 122)" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20V8c0-3 3-5 6-5" />
      <path d="M12 11c0-2-2-4-6-4 4 0 6 2 6 4z" fill="#34D399" fill-opacity="0.2" />
    </g>
    <text x="48" y="143" class="label-key" fill="#34D399">Learning</text>
    <text x="146" y="143" class="label-val">System Design · Kubernetes · Kafka</text>

    <!-- ─── ROW 5: Ask me about ─── -->
    <!-- Chat Speech Bubble -->
    <g transform="translate(18, 158)" stroke="#818CF8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
    </g>
    <text x="48" y="179" class="label-key" fill="#818CF8">Ask me about</text>
    <text x="146" y="179" class="label-val">Spring Boot · REST APIs · AWS</text>

    <!-- ─── ROW 6: Email ─── -->
    <!-- Envelope -->
    <g transform="translate(18, 194)" stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="18" height="14" rx="2" />
      <path d="M3 7l9 6 9-6" />
    </g>
    <text x="48" y="215" class="label-key" fill="#22D3EE">Email</text>
    <text x="146" y="215" class="label-val val-mono">ayushparadkar4@gmail.com</text>

    <!-- ─── ROW 7: Fun fact ─── -->
    <!-- Lightning Bolt -->
    <g transform="translate(18, 230)" stroke="#FBBF24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 2 L3 12 L11 12 L9 20 L19 10 L11 10 Z" fill="#FBBF24" fill-opacity="0.2" />
    </g>
    <text x="48" y="251" class="label-key" fill="#FBBF24">Fun fact</text>
    <text x="146" y="251" class="label-val">I debug prod at 2AM &amp; love it 😄</text>

  </g>
</svg>
