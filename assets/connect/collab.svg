<svg xmlns="http://www.w3.org/2000/svg" width="280" height="160" viewBox="0 0 280 160" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#border-grad); stroke-width: 1.5; }
    .label { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 13px; fill: #FFFFFF; letter-spacing: 1px; }
    .sub { font-family: 'Fira Code', monospace; font-weight: 600; font-size: 9px; fill: #FFA116; letter-spacing: 0.5px; }
    .glow-orange { filter: url(#glow-o); }
    .glow-red { filter: url(#glow-r); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-o" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-r" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Border Gradient -->
    <linearGradient id="border-grad" x1="0" y1="0" x2="280" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFA116" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FF6B6B" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Icon Gradient -->
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFA116" />
      <stop offset="100%" stop-color="#FF6B6B" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="278" height="158" rx="10" class="card-bg" />

  <!-- Code Grid / Tech Background details -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1">
    <path d="M 0,20 L 280,20 M 0,40 L 280,40 M 0,60 L 280,60 M 0,80 L 280,80 M 0,100 L 280,100 M 0,120 L 280,120 M 0,140 L 280,140" />
    <path d="M 40,0 L 40,160 M 80,0 L 80,160 M 120,0 L 120,160 M 160,0 L 160,160 M 200,0 L 200,160 M 240,0 L 240,160" />
  </g>

  <!-- Git Graph branch visualization (Collab theme) -->
  <g opacity="0.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main branch -->
    <path d="M20,60 L90,60" stroke="#30363D" stroke-width="2" />
    <!-- Branch out -->
    <path d="M40,60 C55,60 55,30 70,30 L90,30" stroke="#FF6B6B" stroke-width="2" />
    <!-- Nodes -->
    <circle cx="40" cy="60" r="3.5" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
    <circle cx="70" cy="30" r="3.5" fill="#161B22" stroke="#FF6B6B" stroke-width="1.5" class="glow-red">
      <animate attributeName="stroke-width" values="1.5;3;1.5" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="85" cy="60" r="3.5" fill="#161B22" stroke="#30363D" stroke-width="1.5" />

    <!-- Data packet sliding along the branch out path -->
    <circle r="2" fill="#FFA116" class="glow-orange">
      <animateMotion path="M40,60 C55,60 55,30 70,30 L90,30" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Main Illustration (Collab Rocket Ship Launch) -->
  <g transform="translate(145, 15)">
    <!-- Glowing Halo -->
    <circle cx="45" cy="40" r="30" fill="#FFA116" fill-opacity="0.1" class="glow-orange">
      <animate attributeName="r" values="26;34;26" dur="3s" repeatCount="indefinite" />
      <animate attributeName="fill-opacity" values="0.05;0.2;0.05" dur="3s" repeatCount="indefinite" />
    </circle>

    <!-- Rocket and thrust group to float together -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3.5s" repeatCount="indefinite" />
      
      <!-- Rocket Body -->
      <path d="M37,12 C37,12 40,5 45,5 C50,5 53,12 53,12 L56,36 C56,36 50,42 45,42 C40,42 34,36 34,36 Z" fill="url(#icon-grad)" stroke="#FFFFFF" stroke-width="1" class="glow-orange" />
      <!-- Fins -->
      <path d="M34,28 L27,37 C27,37 32,38 34,35 Z" fill="#FF6B6B" />
      <path d="M56,28 L63,37 C63,37 58,38 56,35 Z" fill="#FF6B6B" />
      <!-- Window -->
      <circle cx="45" cy="18" r="4.5" fill="#111827" stroke="#FFFFFF" stroke-width="1" />
      <circle cx="43" cy="16" r="1" fill="#FFFFFF" opacity="0.6" />

      <!-- Rocket Thrust Fire -->
      <path d="M41,43 L45,54 L49,43 Z" fill="#FFA116" opacity="0.9" class="glow-orange">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="0.15s" repeatCount="indefinite" />
      </path>
      <path d="M43,43 L45,49 L47,43 Z" fill="#FF5F56">
        <animate attributeName="opacity" values="1;0.6;1" dur="0.12s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Sparkles -->
    <circle cx="20" cy="20" r="1.5" fill="#FFA116" class="glow-orange">
      <animate attributeName="r" values="0.5;2;0.5" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="68" cy="24" r="2" fill="#FF6B6B" class="glow-red">
      <animate attributeName="r" values="2;0.5;2" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Title & Description Text Inside Card -->
  <g transform="translate(25, 110)">
    <text class="label" x="0" y="0">🤝 COLLABORATION</text>
    <text class="sub" x="0" y="16">OPEN SOURCE • HACKATHONS</text>
    <line x1="0" y1="26" x2="230" y2="26" stroke="#30363D" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
