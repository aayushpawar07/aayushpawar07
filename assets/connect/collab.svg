<svg xmlns="http://www.w3.org/2000/svg" width="380" height="440" viewBox="0 0 380 440" fill="none">
  <style>
    .card-bg { fill: #0D1117; stroke: url(#card-grad); stroke-width: 1.5; }
    .title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; fill: #FFFFFF; letter-spacing: 0.5px; }
    .tech { font-family: 'Fira Code', monospace; font-weight: 600; font-size: 11px; fill: #FFA116; letter-spacing: 0.5px; }
    .desc { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px; fill: #8B949E; }
    .glow-orange { filter: url(#glow-o); }
    .glow-red { filter: url(#glow-r); }
  </style>

  <defs>
    <!-- Glow Filters -->
    <filter id="glow-o" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-r" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Outer Gradient -->
    <linearGradient id="card-grad" x1="0" y1="0" x2="380" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFA116" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#30363D" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FF6B6B" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Icon Gradient -->
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFA116" />
      <stop offset="100%" stop-color="#FF6B6B" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect x="1" y="1" width="378" height="438" rx="12" class="card-bg" />

  <!-- Header Section -->
  <g transform="translate(190, 45)">
    <text text-anchor="middle" class="title">🤝 COLLABORATION</text>
  </g>

  <!-- ==================== ILLUSTRATION AREA ==================== -->
  <g transform="translate(0, 75)">
    <!-- Base Ground Line -->
    <line x1="50" y1="185" x2="330" y2="185" stroke="#30363D" stroke-width="2" stroke-linecap="round" />
    
    <!-- Dashed Speed trails (Animated) -->
    <line x1="280" y1="175" x2="310" y2="175" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="6 4" class="glow-red">
      <animate attributeName="stroke-dashoffset" values="30;0" dur="0.8s" repeatCount="indefinite" />
    </line>
    <line x1="60" y1="175" x2="90" y2="175" stroke="#FFA116" stroke-width="2" stroke-dasharray="6 4" class="glow-orange">
      <animate attributeName="stroke-dashoffset" values="0;30" dur="0.8s" repeatCount="indefinite" />
    </line>

    <!-- Git Graph branch visualization (Left side) -->
    <g transform="translate(55, 45)">
      <g opacity="0.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20,60 L90,60" stroke="#30363D" stroke-width="2.5" />
        <path d="M40,60 C55,60 55,30 70,30 L90,30" stroke="#FF6B6B" stroke-width="2.5" />
        <circle cx="40" cy="60" r="4.5" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
        <circle cx="70" cy="30" r="4.5" fill="#161B22" stroke="#FF6B6B" stroke-width="1.5" class="glow-red">
          <animate attributeName="stroke-width" values="1.5;3.5;1.5" dur="2s" repeatCount="indefinite" />
        </circle>
        <circle cx="85" cy="60" r="4.5" fill="#161B22" stroke="#30363D" stroke-width="1.5" />

        <!-- Data packet sliding along the branch out path -->
        <circle r="2.5" fill="#FFA116" class="glow-orange">
          <animateMotion path="M40,60 C55,60 55,30 70,30 L90,30" dur="3s" repeatCount="indefinite" />
        </circle>
      </g>
    </g>

    <!-- Main Rocket Illustration (Right side) -->
    <g transform="translate(205, 35)">
      <!-- Glowing Halo -->
      <circle cx="45" cy="40" r="30" fill="#FFA116" fill-opacity="0.1" class="glow-orange">
        <animate attributeName="r" values="26;34;26" dur="3s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" values="0.05;0.2;0.05" dur="3s" repeatCount="indefinite" />
      </circle>

      <!-- Rocket and thrust group to float together -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3.5s" repeatCount="indefinite" />
        
        <!-- Rocket Body -->
        <path d="M37,12 C37,12 40,5 45,5 C50,5 53,12 53,12 L56,36 C56,36 50,42 45,42 C40,42 34,36 34,36 Z" fill="url(#icon-grad)" stroke="#FFFFFF" stroke-width="1" class="glow-orange" />
        <!-- Fins -->
        <path d="M34,28 L27,37 C27,37 32,38 34,35 Z" fill="#FF6B6B" />
        <path d="M56,28 L63,37 C63,37 58,38 56,35 Z" fill="#FF6B6B" />
        <!-- Window -->
        <circle cx="45" cy="18" r="4.5" fill="#111827" stroke="#FFFFFF" stroke-width="1" />
        <circle cx="43" cy="16" r="1" fill="#FFFFFF" opacity="0.6" />

        <!-- Rocket Thrust Fire -->
        <path d="M41,43 L45,54 L49,43 Z" fill="#FFA116" opacity="0.9" class="glow-orange">
          <animate attributeName="opacity" values="0.9;0.4;0.9" dur="0.15s" repeatCount="indefinite" />
        </path>
        <path d="M43,43 L45,49 L47,43 Z" fill="#FF5F56">
          <animate attributeName="opacity" values="1;0.6;1" dur="0.12s" repeatCount="indefinite" />
        </path>
      </g>
    </g>
    
    <!-- Twinkling Sparkles -->
    <circle cx="65" cy="35" r="2.5" fill="#FFA116" class="glow-orange">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="r" values="2;3.2;2" dur="2.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="130" r="3" fill="#FF6B6B" class="glow-red">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;1.5;3" dur="2.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ==================== TEXT & DETAILS ==================== -->
  <!-- Tech Stack -->
  <g transform="translate(190, 325)">
    <text text-anchor="middle" class="tech">OPEN SOURCE • HACKATHONS</text>
  </g>

  <!-- Description Body -->
  <g transform="translate(190, 355)" font-size="12" fill="#8B949E">
    <text text-anchor="middle" class="desc">Open Source Projects</text>
    <text text-anchor="middle" class="desc" y="20">Hackathons &amp; Competitions</text>
    <text text-anchor="middle" class="desc" y="40">Exciting Side Projects</text>
  </g>
</svg>
