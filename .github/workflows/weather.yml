name: Update Live Stats Cards

on:
  schedule:
    - cron: "0 */3 * * *"   # Runs every 3 hours
  workflow_dispatch:        # Allows manual trigger
  push:
    branches:
      - main
    paths:
      - 'scripts/update_weather.py'
      - 'scripts/update_leetcode.py'
      - '.github/workflows/weather.yml'

jobs:
  update-cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Weather Script
        run: python scripts/update_weather.py

      - name: Run LeetCode Stats Script
        run: python scripts/update_leetcode.py

      - name: Commit and Push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/weather/bhopal.svg assets/leetcode/stats.svg
          git diff-index --quiet HEAD || git commit -m "chore: auto-update live profile cards [skip ci]"
          git push origin main

